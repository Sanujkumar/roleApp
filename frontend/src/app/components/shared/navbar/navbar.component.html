<nav class="border-b border-slate-800 bg-slate-950/90 backdrop-blur-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-violet-600 flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
          </svg>
        </div>
        <span class="font-display font-bold text-white tracking-tight text-lg">RoleApp</span>
      </div>

      <!-- Nav Links -->
      <div class="flex items-center gap-1" *ngIf="user">
        <a routerLink="/dashboard"
           [class]="'nav-link ' + (isActive('/dashboard') ? 'nav-link-active' : 'nav-link-inactive')">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 10h16M4 14h16M4 18h16" />
          </svg>
          Dashboard
        </a>
        <a *ngIf="authService.isAdmin"
           routerLink="/admin"
           [class]="'nav-link ' + (isActive('/admin') ? 'nav-link-active' : 'nav-link-inactive')">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
          Admin Panel
        </a>
      </div>

      <!-- User Menu -->
      <div class="flex items-center gap-4" *ngIf="user">
        <div class="flex items-center gap-3">
          <div class="text-right hidden sm:block">
            <p class="text-sm font-display font-semibold text-slate-200">{{ user.name }}</p>
            <div class="flex items-center justify-end gap-1.5">
              <span class="w-1.5 h-1.5 rounded-full"
                [class]="user.role === 'ADMIN' ? 'bg-amber-400' : 'bg-emerald-400'"></span>
              <span class="text-xs font-mono text-slate-400">{{ user.role }}</span>
            </div>
          </div>
          <div class="w-9 h-9 rounded-full flex items-center justify-center font-display font-bold text-sm"
               [class]="user.role === 'ADMIN' ? 'bg-amber-500/20 text-amber-400 border border-amber-500/30' : 'bg-violet-500/20 text-violet-400 border border-violet-500/30'">
            {{ user.name.charAt(0).toUpperCase() }}
          </div>
        </div>
        <button (click)="logout()"
                class="text-slate-400 hover:text-slate-200 p-2 rounded-lg hover:bg-slate-800 transition-all duration-200"
                title="Logout">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</nav>
